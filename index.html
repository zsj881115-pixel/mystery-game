<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰与火的抉择 · by JasonZhou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #08060a;
    --bg-card: #15110a;
    --bg-parchment: #1e1810;
    --gold: #c9a227;
    --gold-bright: #e8c84a;
    --gold-dim: #8a7a4a;
    --parchment: #d4c4a0;
    --parchment-dim: #9a8a6a;
    --blood: #8b2c2c;
    --blood-bright: #c94444;
    --ice: #5a8aaa;
    --steel: #4a5a6a;
    --shadow: rgba(0,0,0,0.8);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--parchment);
    font-family: 'MedievalSharp', 'Microsoft YaHei', serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(139,44,44,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, rgba(90,138,170,0.03) 0%, transparent 50%);
  }

  /* ========== TITLE SCREEN ========== */
  #title-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.8s ease;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }

  .title-bg {
    position: absolute;
    inset: 0;
    background: url('images/cover.jpg') center/cover no-repeat;
    filter: brightness(0.45);
  }
  .title-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(8,6,10,0.8) 80%);
  }

  .title-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    animation: titleFadeIn 2s ease;
  }

  @keyframes titleFadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    color: var(--gold-bright);
    text-shadow: 0 0 30px rgba(201,162,39,0.5), 0 0 60px rgba(201,162,39,0.2), 0 4px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }

  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    color: var(--parchment-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .title-desc {
    font-size: clamp(0.85rem, 1.8vw, 1.05rem);
    color: var(--parchment);
    max-width: 500px;
    margin: 0 auto 3rem;
    line-height: 1.8;
    opacity: 0.85;
  }

  .btn-start {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold-bright);
    background: linear-gradient(180deg, rgba(30,24,16,0.9), rgba(10,8,10,0.95));
    border: 2px solid var(--gold);
    padding: 1rem 3rem;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
  }
  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,162,39,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .btn-start:hover {
    background: linear-gradient(180deg, rgba(40,30,20,0.9), rgba(20,15,20,0.95));
    border-color: var(--gold-bright);
    box-shadow: 0 0 20px rgba(201,162,39,0.3);
    transform: translateY(-2px);
  }
  .btn-start:hover::before { transform: translateX(100%); }

  .title-ornament {
    color: var(--gold);
    font-size: 1.5rem;
    margin: 1rem 0;
    letter-spacing: 1rem;
    opacity: 0.6;
  }

  /* ========== CHARACTER SELECT ========== */
  #select-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    animation: fadeIn 0.6s ease;
  }
  #select-screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .select-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .select-header h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .select-header p {
    color: var(--parchment-dim);
    font-size: 0.95rem;
  }

  .character-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    width: 100%;
  }

  .char-card {
    background: var(--bg-card);
    border: 2px solid var(--gold-dim);
    border-radius: 4px;
    padding: 0;
    cursor: pointer;
    transition: all 0.4s ease;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .char-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(8,6,10,0.5));
    pointer-events: none;
    z-index: 1;
  }
  .char-card:hover {
    border-color: var(--gold);
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(201,162,39,0.15);
  }

  .char-card-banner {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .char-card-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent, var(--bg-card));
  }
  .char-sigil {
    font-size: 3rem;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .char-card-body {
    padding: 1rem 1.2rem 1.2rem;
    position: relative;
    z-index: 2;
  }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--gold-bright);
    margin-bottom: 0.2rem;
  }
  .char-title {
    font-size: 0.8rem;
    color: var(--parchment-dim);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
  }
  .char-desc {
    font-size: 0.85rem;
    color: var(--parchment);
    line-height: 1.5;
    opacity: 0.8;
  }
  .char-card-footer {
    margin-top: 0.8rem;
    padding-top: 0.6rem;
    border-top: 1px solid rgba(201,162,39,0.15);
    font-size: 0.75rem;
    color: var(--gold-dim);
    letter-spacing: 0.05em;
  }

  /* ========== GAME SCREEN ========== */
  #game-screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.5s ease;
  }
  #game-screen.active { display: flex; }

  .scene-wrapper {
    width: 100%;
    max-width: 800px;
    padding: 1.5rem 1rem;
    animation: sceneIn 0.5s ease;
  }

  @keyframes sceneIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(201,162,39,0.15);
  }
  .scene-char {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .scene-act {
    font-size: 0.8rem;
    color: var(--parchment-dim);
    letter-spacing: 0.1em;
  }

  .scene-image {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid rgba(201,162,39,0.2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    margin-bottom: 1.5rem;
    position: relative;
  }
  .scene-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.85);
  }
  .scene-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(8,6,10,0.4));
    pointer-events: none;
  }

  .scene-text {
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    line-height: 1.9;
    color: var(--parchment);
    margin-bottom: 1.5rem;
    padding: 0 0.5rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    padding: 0 0.5rem;
  }

  .choice-btn {
    font-family: 'MedievalSharp', 'Microsoft YaHei', serif;
    font-size: 1.05rem;
    color: var(--parchment);
    background: linear-gradient(180deg, rgba(30,24,16,0.8), rgba(15,12,10,0.9));
    border: 1px solid rgba(201,162,39,0.25);
    padding: 1rem 1.5rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.3s ease;
    position: relative;
    border-radius: 2px;
  }
  .choice-btn::before {
    content: '\25C6';
    color: var(--gold-dim);
    margin-right: 0.8rem;
    transition: all 0.3s ease;
    font-size: 0.7em;
    vertical-align: middle;
  }
  .choice-btn:hover {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(40,30,20,0.8), rgba(20,15,12,0.9));
    color: var(--gold-bright);
    transform: translateX(6px);
    box-shadow: -4px 0 0 0 var(--gold);
  }
  .choice-btn:hover::before {
    color: var(--gold-bright);
  }

  /* ========== ENDING SCREEN ========== */
  #ending-screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.8s ease;
  }
  #ending-screen.active { display: flex; }

  .ending-wrapper {
    width: 100%;
    max-width: 800px;
    padding: 2rem 1rem;
    text-align: center;
  }

  .ending-image {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid var(--gold);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 40px rgba(201,162,39,0.1);
    margin-bottom: 2rem;
  }
  .ending-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.8);
  }

  .ending-label {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    margin-bottom: 0.5rem;
  }

  .ending-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--gold-bright);
    text-shadow: 0 0 20px rgba(201,162,39,0.3);
    margin-bottom: 1.5rem;
    line-height: 1.2;
  }

  .ending-text {
    font-size: 1.15rem;
    line-height: 2;
    color: var(--parchment);
    max-width: 600px;
    margin: 0 auto 2rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .ending-divider {
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 1rem;
    margin: 2rem 0 1rem;
    opacity: 0.5;
  }

  .ending-counter {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
  }
  .ending-counter strong {
    font-size: 1.5rem;
    color: var(--gold-bright);
  }

  .ending-gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .gallery-item {
    width: 44px;
    height: 44px;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    cursor: default;
  }
  .gallery-item.discovered {
    border-color: var(--gold);
    background: rgba(201,162,39,0.1);
  }
  .gallery-item.locked {
    border-color: rgba(201,162,39,0.15);
    color: var(--parchment-dim);
    opacity: 0.3;
  }
  .gallery-item.new {
    border-color: var(--blood-bright);
    box-shadow: 0 0 12px rgba(201,68,68,0.4);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px rgba(201,68,68,0.3); }
    50% { box-shadow: 0 0 20px rgba(201,68,68,0.5); }
  }

  .ending-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-secondary {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--parchment);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 0.8rem 2rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    border-radius: 2px;
  }
  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold-bright);
    box-shadow: 0 0 12px rgba(201,162,39,0.15);
  }

  /* Back button */
  .back-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 50;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--parchment-dim);
    background: rgba(15,12,10,0.8);
    border: 1px solid rgba(201,162,39,0.2);
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 2px;
    display: none;
  }
  .back-btn.visible { display: block; }
  .back-btn:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  /* Tooltip */
  .gallery-item {
    position: relative;
  }
  .gallery-item .tooltip {
    display: none;
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--gold-dim);
    color: var(--parchment);
    padding: 0.4rem 0.8rem;
    font-size: 0.75rem;
    white-space: nowrap;
    border-radius: 2px;
    z-index: 10;
  }
  .gallery-item:hover .tooltip { display: block; }

  /* Responsive */
  @media (max-width: 600px) {
    .character-grid { grid-template-columns: 1fr; }
    .scene-wrapper { padding: 1rem 0.8rem; }
    .choice-btn { font-size: 0.95rem; padding: 0.9rem 1.2rem; }
  }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <div class="title-bg"></div>
  <div class="title-content">
    <div class="title-ornament">&#10046; &#10046; &#10046;</div>
    <h1 class="title-main">冰与火的抉择</h1>
    <div class="title-sub">by JasonZhou</div>
    <p class="title-desc">
      七国纷争，铁王座悬空。<br>
      北境异鬼蠢动，东方巨龙复苏。<br>
      你的每一个选择，都将改写王国的命运。<br>
      <span style="color:var(--gold-dim);font-size:0.9em;">六条道路，十种结局，只等你来抉择。</span>
    </p>
    <button class="btn-start" onclick="startGame()">开始你的命运</button>
    <div class="title-ornament">&#10046; &#10046; &#10046;</div>
  </div>
</div>

<!-- Character Select -->
<div id="select-screen">
  <div class="select-header">
    <h2>选择你的角色</h2>
    <p>不同的角色，将展开完全不同的命运</p>
  </div>
  <div class="character-grid" id="char-grid"></div>
</div>

<!-- Game Screen -->
<div id="game-screen">
  <button class="back-btn" onclick="backToSelect()">返回选择</button>
  <div class="scene-wrapper" id="scene-wrapper"></div>
</div>

<!-- Ending Screen -->
<div id="ending-screen">
  <div class="ending-wrapper" id="ending-wrapper"></div>
</div>

<script>
// ========== ENDING DEFINITIONS ==========
const ENDINGS = {
  iron_throne: { title: '铁王座加冕', icon: '\uD83D\uDC51', image: 'images/crown.jpg',
    text: '你统一了七国，坐上了铁王座。\n但这一把由龙焰熔铸的剑椅，比你想象的更加冰冷。\n胜利的代价，只有你自己知道。' },
  dragonfire: { title: '龙焰焚天', icon: '\uD83D\uDD25', image: 'images/dragon.jpg',
    text: '巨龙焚毁了旧世界的一切。\n新纪元从灰烬中升起，但整个文明也随之化为焦土。\n你赢了，但七国已不复存在。' },
  winter: { title: '凛冬降临', icon: '\u2744', image: 'images/wall.jpg',
    text: '异鬼吞噬了一切。\n长夜降临，永恒的寒冷覆盖了七国。\n没有人记得最后的歌声，只有风雪在空城中呼啸。' },
  shadow: { title: '暗影之王', icon: '\uD83D\uDD77', image: 'images/throne.jpg',
    text: '你从未坐上铁王座，但七国的每一道命令都出自你手。\n你是暗影中的王，无人知晓你的名字。\n但权力的滋味，比任何毒药都更令人沉醉。' },
  exile: { title: '流亡天涯', icon: '\uD83C\uDF0A', image: 'images/castle.jpg',
    text: '你失败了，但你活着。\n身后是燃烧的故土，前方是未知的东方。\n也许有一天，你会带着新的力量归来。\n也许……这就是新的开始。' },
  hero: { title: '英雄殉国', icon: '\u2694', image: 'images/battle.jpg',
    text: '你倒在了战场上。\n但你的牺牲为七国赢得了黎明。\n吟游诗人将永远传唱你的名字，\n直到最后一个字母消散在风中。' },
  peace: { title: '黄金黎明', icon: '\u2600', image: 'images/crown.jpg',
    text: '你以智慧和勇气为七国带来了和平。\n没有龙焰，没有鲜血，只有金色的黎明。\n这是最好的结局，也是最罕见的结局。' },
  commoner_king: { title: '铁匠称王', icon: '\uD83D\uDD28', image: 'images/crown.jpg',
    text: '你从铁匠铺走出，手握先王之剑，身后是万千平民。\n从未有出身如此卑微的人坐上铁王座。\n但正是你的平凡，让七国第一次看到了希望。\n铁匠的锤子，也可以锻造王冠。' },
  nobody: { title: '无人', icon: '\uD83C\uDFAD', image: 'images/assassin.jpg',
    text: '你完成了契约。千面之神取走了你的名字、你的记忆、你的过去。\n从此世间再无此人，只有千面之神的容器。\n你是风中的灰烬，水中的倒影。\n你是——无人。' },
  reckoning: { title: '审判降临', icon: '\u2696', image: 'images/judgment.jpg',
    text: '你的刀刃引发了连锁审判。\n一个接一个，七国的权贵倒下，不分善恶。\n当尘埃落定，空荡荡的铁王座前，只有你独自站立。\n审判的天平从不偏袒任何人——包括审判者自己。' }
};

// ========== CHARACTER DEFINITIONS ==========
const CHARACTERS = [
  { id: 'eddard', name: '艾德·史塔克', title: '北境守护', sigil: '\uD83D\uDC3A',
    desc: '正直的北境领主，家族信守荣誉超过生命。',
    banner: 'linear-gradient(135deg, #2a3a4a, #1a2530)', startScene: 'eddard_1' },
  { id: 'daenerys', name: '丹妮莉丝', title: '龙裔公主', sigil: '\uD83D\uDC09',
    desc: '被放逐的王朝血脉，手握三颗石化龙蛋。',
    banner: 'linear-gradient(135deg, #4a1a1a, #2a0a0a)', startScene: 'daenerys_1' },
  { id: 'jon', name: '琼恩·雪诺', title: '守夜人', sigil: '\u2694',

// ========== GAME STATE ==========
let state = {
  character: null,
  currentScene: null
};

// ========== ENDING TRACKING ==========
function getEndings() {
  try { return JSON.parse(localStorage.getItem('iron_ice_endings') || '[]'); }
  catch(e) { return []; }
}
function saveEnding(id) {
  try {
    const endings = getEndings();
    const isNew = !endings.includes(id);
    if (isNew) {
      endings.push(id);
      localStorage.setItem('iron_ice_endings', JSON.stringify(endings));
    }
    return { isNew, total: endings.length };
  } catch(e) {
    return { isNew: false, total: 0 };
  }
}

// ========== RENDER FUNCTIONS ==========
function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    renderCharacterSelect();
  }, 800);
}

function renderCharacterSelect() {
  document.getElementById('select-screen').classList.add('active');
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('ending-screen').classList.remove('active');
  document.querySelector('.back-btn').classList.remove('visible');

  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  const endings = getEndings();
  const discoveredCount = endings.length;
  const totalEndings = Object.keys(ENDINGS).length;

  CHARACTERS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.style.animationDelay = (i * 0.15) + 's';
    card.style.animation = 'sceneIn 0.5s ease ' + (i * 0.1) + 's both';

    card.innerHTML = `
      <div class="char-card-banner" style="background: ${c.banner}">
        <div class="char-sigil">${c.sigil}</div>
      </div>
      <div class="char-card-body">
        <div class="char-name">${c.name}</div>
        <div class="char-title">${c.title}</div>
        <div class="char-desc">${c.desc}</div>
        <div class="char-card-footer">已发现结局 ${discoveredCount}/${totalEndings}</div>
      </div>
    `;
    card.onclick = () => selectCharacter(c);
    grid.appendChild(card);
  });
}

function selectCharacter(char) {
  state.character = char;
  state.currentScene = char.startScene;

  document.getElementById('select-screen').classList.remove('active');
  const gameScreen = document.getElementById('game-screen');
  gameScreen.classList.add('active');
  document.querySelector('.back-btn').classList.add('visible');

  renderScene();
}

function renderScene() {
  const scene = SCENES[state.currentScene];
  if (!scene) return;

  const wrapper = document.getElementById('scene-wrapper');
  wrapper.style.animation = 'none';
  void wrapper.offsetWidth;
  wrapper.style.animation = 'sceneIn 0.5s ease';

  let choicesHTML = scene.choices.map((c, i) =>
    `<button class="choice-btn" onclick="makeChoice('${c.next}')">${c.text}</button>`
  ).join('');

  wrapper.innerHTML = `
    <div class="scene-header">
      <span class="scene-char">${state.character.sigil} ${scene.char}</span>
      <span class="scene-act">${scene.act}</span>
    </div>
    <div class="scene-image"><img src="${scene.image}" alt=""></div>
    <div class="scene-text">${scene.text}</div>
    <div class="choices">${choicesHTML}</div>
  `;
}

function makeChoice(nextScene) {
  if (nextScene.startsWith('ending_')) {
    showEnding(nextScene);
  } else {
    state.currentScene = nextScene;
    renderScene();
  }
}

function showEnding(endingId) {
  // Strip 'ending_' prefix to match ENDINGS object keys
  const id = endingId.replace('ending_', '');
  const ending = ENDINGS[id];
  if (!ending) { console.error('Ending not found:', endingId); return; }

  let isNew = false, total = 0;
  try { const r = saveEnding(id); isNew = r.isNew; total = r.total; } catch(e) {}
  const allEndings = getEndings();
  const totalEndings = Object.keys(ENDINGS).length;

  document.getElementById('game-screen').classList.remove('active');
  document.querySelector('.back-btn').classList.remove('visible');
  const endScreen = document.getElementById('ending-screen');
  endScreen.classList.add('active');

  const wrapper = document.getElementById('ending-wrapper');

  let galleryHTML = Object.keys(ENDINGS).map((gid) => {
    const e = ENDINGS[gid];
    const discovered = allEndings.includes(gid);
    const newBadge = (gid === id && isNew) ? ' new' : '';
    const cls = discovered ? 'discovered' + newBadge : 'locked';
    const tip = discovered ? e.title : '\u672A\u53D1\u73B0';
    return `<div class="gallery-item ${cls}" title="${tip}">${discovered ? e.icon : '?'}<span class="tooltip">${tip}</span></div>`;
  }).join('');

  wrapper.innerHTML = `
    <div class="ending-image"><img src="${ending.image}" alt=""></div>
    <div class="ending-label">${isNew ? '\u2726 \u65B0\u7ED3\u5C40\u89E3\u9501 \u2726' : '\u5DF2\u53D1\u73B0\u7684\u7ED3\u5C40'}</div>
    <h2 class="ending-title">${ending.title}</h2>
    <div class="ending-text">${ending.text.replace(/\n/g, '<br>')}</div>
    <div class="ending-divider">\u10046 \u10046 \u10046</div>
    <div class="ending-counter">\u8FD9\u662F <strong>${total}</strong> / ${totalEndings} \u4E2A\u7ED3\u5C40</div>
    <div class="ending-gallery">${galleryHTML}</div>
    <div class="ending-actions">
      <button class="btn-secondary" onclick="renderCharacterSelect()">\u9009\u62E9\u5176\u4ED6\u89D2\u8272</button>
      <button class="btn-secondary" onclick="returnToTitle()">\u56DE\u5230\u9996\u9875</button>
    </div>
    ${total < totalEndings ? `<p style="margin-top:1.5rem;color:var(--parchment-dim);font-size:0.9rem;">\u4E0D\u540C\u7684\u89D2\u8272\u548C\u9009\u62E9\u5C06\u901A\u5411\u622A\u7136\u4E0D\u540C\u7684\u547D\u8FD0\u2026\u2026</p>` : `<p style="margin-top:1.5rem;color:var(--gold);font-size:0.95rem;">\u4F60\u5DF2\u53D1\u73B0\u6240\u6709\u7ED3\u5C40\u3002\u4F20\u5947\u5DF2\u6210\u3002</p>`}
  `;

  endScreen.scrollIntoView({ behavior: 'smooth' });
}

function backToSelect() {
  document.getElementById('game-screen').classList.remove('active');
  renderCharacterSelect();
}

function returnToTitle() {
  document.getElementById('ending-screen').classList.remove('active');
  document.getElementById('select-screen').classList.remove('active');
  document.getElementById('game-screen').classList.remove('active');
  const titleScreen = document.getElementById('title-screen');
  titleScreen.style.display = 'flex';
  titleScreen.classList.remove('hidden');
}
</script>
