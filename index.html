<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雨夜山庄 · 三刀两毒</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d12;--panel:rgba(18,22,30,.92);--border:rgba(120,100,80,.25);
  --text:#d4cfc6;--dim:#8a8478;--accent:#c4956a;--danger:#c44a4a;
  --success:#6a9a6a;--gold:#d4a853;--lock:#555;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;
  min-height:100vh;overflow-x:hidden;position:relative}

/* Rain effect */
.rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:.3}
.rain::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:repeating-linear-gradient(105deg,transparent,transparent 8px,
  rgba(180,200,220,.03) 8px,rgba(180,200,220,.03) 10px));animation:rain .5s linear infinite}
@keyframes rain{from{background-position:0 0}to{background-position:-20px 20px}}

/* Scene bg */
#sceneBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  background-size:cover;background-position:center;transition:background-image 1.2s ease-in-out;
  filter:brightness(.35) saturate(.7)}
#sceneBg::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(to bottom,rgba(10,13,18,.4) 0%,rgba(10,13,18,.75) 50%,rgba(10,13,18,.95) 100%)}

/* Main container */
#game{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:20px;max-width:680px;margin:0 auto}

/* Title screen */
.title-screen{text-align:center;padding:40px 20px;animation:fadeUp 1s ease}
.title-screen h1{font-family:'Noto Serif SC',serif;font-size:2.8em;font-weight:900;
  color:var(--gold);text-shadow:0 0 30px rgba(212,168,83,.3);letter-spacing:.08em;margin-bottom:.3em}
.title-screen .subtitle{font-family:'Noto Serif SC',serif;font-size:1.1em;color:var(--dim);
  letter-spacing:.3em;margin-bottom:2em}
.title-screen .desc{font-size:.95em;color:var(--dim);line-height:1.8;max-width:480px;margin:0 auto 2em}
.btn-start{display:inline-block;padding:14px 48px;font-family:'Noto Serif SC',serif;font-size:1.2em;
  color:var(--gold);border:1px solid var(--gold);border-radius:2px;cursor:pointer;
  background:transparent;letter-spacing:.15em;transition:all .4s}
.btn-start:hover{background:rgba(212,168,83,.1);box-shadow:0 0 20px rgba(212,168,83,.2)}

/* Scene card */
.scene-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:28px 24px;margin-bottom:16px;width:100%;backdrop-filter:blur(8px);
  animation:fadeUp .6s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.scene-title{font-family:'Noto Serif SC',serif;font-size:1.4em;color:var(--accent);
  margin-bottom:16px;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:10px}
.scene-text{font-size:.95em;line-height:1.85;color:var(--text);margin-bottom:20px;white-space:pre-line}
.scene-text .highlight{color:var(--gold);font-weight:500}
.scene-text .danger{color:var(--danger)}
.scene-text .clue{color:var(--accent);font-style:italic}
.scene-text .thought{color:var(--dim);font-style:italic}

/* Character avatar */
.char-row{display:flex;align-items:center;gap:12px;margin:12px 0;padding:10px 14px;
  background:rgba(255,255,255,.03);border-radius:4px;border-left:3px solid var(--border)}
.char-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.3em;flex-shrink:0;border:2px solid var(--border)}
.char-info{flex:1}
.char-name{font-weight:500;color:var(--text);font-size:.95em}
.char-desc{font-size:.8em;color:var(--dim);margin-top:2px}

/* Choices */
.choices{display:flex;flex-direction:column;gap:10px;width:100%}
.choice-btn{display:block;width:100%;text-align:left;padding:14px 18px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-size:.92em;line-height:1.5;cursor:pointer;transition:all .3s;
  font-family:inherit;position:relative}
.choice-btn:hover{background:rgba(196,149,106,.08);border-color:var(--accent);transform:translateX(4px)}
.choice-btn .tag{display:inline-block;font-size:.75em;padding:2px 8px;border-radius:2px;
  margin-left:8px;vertical-align:middle}
.tag-prof{background:rgba(106,154,106,.15);color:var(--success);border:1px solid rgba(106,154,106,.3)}
.tag-item{background:rgba(196,149,106,.15);color:var(--accent);border:1px solid rgba(196,149,106,.3)}
.tag-evidence{background:rgba(212,168,83,.1);color:var(--gold);border:1px solid rgba(212,168,83,.2)}
.choice-btn.locked{opacity:.4;cursor:not-allowed;border-style:dashed}
.choice-btn.locked:hover{transform:none;background:rgba(255,255,255,.04)}
.choice-btn.locked .lock-hint{display:block;font-size:.78em;color:var(--lock);margin-top:4px}

/* Profession cards */
.card-deck{display:flex;justify-content:center;perspective:1000px;margin:20px 0}
.prof-card{width:160px;height:220px;position:relative;cursor:pointer;
  transform-style:preserve-3d;transition:transform .8s}
.prof-card.flipped{transform:rotateY(180deg)}
.prof-card .face{position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;border:2px solid var(--border)}
.prof-card .front{background:linear-gradient(135deg,#1a1f2a,#0f1318)}
.prof-card .back{background:linear-gradient(135deg,#2a2015,#1a1510);transform:rotateY(180deg);
  border-color:var(--accent)}
.prof-card .front .card-back-pattern{font-size:3em;opacity:.3}
.prof-card .back .prof-icon{font-size:2.5em;margin-bottom:8px}
.prof-card .back .prof-name{font-family:'Noto Serif SC',serif;font-size:1.1em;color:var(--gold);margin-bottom:6px}
.prof-card .back .prof-skill{font-size:.78em;color:var(--dim);text-align:center;line-height:1.5}

/* Item grid */
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.item-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;
  padding:16px;cursor:pointer;transition:all .3s;text-align:center}
.item-card:hover{border-color:var(--accent);background:rgba(196,149,106,.08);transform:translateY(-2px)}
.item-card.selected{border-color:var(--gold);background:rgba(212,168,83,.1);box-shadow:0 0 15px rgba(212,168,83,.15)}
.item-icon{font-size:2em;margin-bottom:6px}
.item-name{font-family:'Noto Serif SC',serif;color:var(--accent);font-size:.95em;margin-bottom:4px}
.item-desc{font-size:.78em;color:var(--dim);line-height:1.5}

/* Evidence panel */
.evidence-toggle{position:fixed;bottom:20px;right:20px;z-index:50;
  background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:8px 16px;cursor:pointer;color:var(--accent);font-size:.85em;
  backdrop-filter:blur(8px);transition:all .3s}
.evidence-toggle:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(196,149,106,.15)}
.evidence-toggle .count{background:var(--accent);color:var(--bg);border-radius:10px;
  padding:1px 7px;font-size:.8em;margin-left:6px;font-weight:700}
.evidence-panel{position:fixed;bottom:0;right:0;width:100%;max-width:380px;
  max-height:70vh;background:var(--panel);border-top:1px solid var(--border);
  border-left:1px solid var(--border);z-index:51;transform:translateY(100%);
  transition:transform .4s ease;backdrop-filter:blur(12px);overflow-y:auto;padding:20px}
.evidence-panel.open{transform:translateY(0)}
.evidence-panel h3{font-family:'Noto Serif SC',serif;color:var(--accent);margin-bottom:12px;
  font-size:1.1em;border-bottom:1px solid var(--border);padding-bottom:8px}
.ev-item{padding:8px 0;border-bottom:1px solid rgba(120,100,80,.1);font-size:.85em;line-height:1.6}
.ev-item .ev-title{color:var(--gold);font-weight:500}
.ev-item .ev-detail{color:var(--dim);font-size:.85em;margin-top:2px}
.ev-empty{text-align:center;color:var(--dim);padding:20px;font-size:.9em}

/* Accusation */
.accuse-section{margin-bottom:20px}
.accuse-q{font-family:'Noto Serif SC',serif;color:var(--accent);font-size:1em;margin-bottom:10px}
.suspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.suspect-card{display:flex;align-items:center;gap:10px;padding:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;transition:all .2s}
.suspect-card:hover{border-color:var(--accent)}
.suspect-card.selected{border-color:var(--danger);background:rgba(196,74,74,.08)}
.suspect-card .av{width:36px;height:36px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0}
.suspect-card .nm{font-size:.85em}
.count-btns{display:flex;gap:8px;flex-wrap:wrap}
.count-btn{padding:8px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:3px;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s}
.count-btn:hover{border-color:var(--accent)}
.count-btn.selected{border-color:var(--danger);background:rgba(196,74,74,.1);color:var(--danger)}

/* Ending */
.ending-card{text-align:center;padding:30px}
.ending-card h2{font-family:'Noto Serif SC',serif;font-size:2em;margin-bottom:16px}
.ending-card .ending-text{font-size:.95em;line-height:1.9;text-align:left;margin:16px 0}
.ending-card .stats{font-size:.85em;color:var(--dim);margin:16px 0;line-height:1.8}
.replay-info{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:4px;padding:16px;margin-top:20px;text-align:left}
.replay-info h4{color:var(--accent);font-size:.9em;margin-bottom:8px}
.replay-info .combo{display:inline-block;font-size:.78em;padding:2px 8px;margin:2px;
  background:rgba(255,255,255,.05);border-radius:2px;color:var(--dim)}
.replay-info .combo.played{color:var(--success);border:1px solid rgba(106,154,106,.3)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim-fade{animation:fadeIn .8s ease}

/* Progress bar */
.progress-bar{width:100%;height:3px;background:rgba(120,100,80,.15);border-radius:2px;
  margin-bottom:16px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(to right,var(--accent),var(--gold));
  transition:width .5s ease}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--panel);border:1px solid var(--accent);border-radius:4px;
  padding:12px 24px;color:var(--accent);font-size:.9em;z-index:100;
  backdrop-filter:blur(8px);transition:transform .4s ease;max-width:90%}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .toast-icon{margin-right:6px}

/* Mobile */
@media(max-width:600px){
  #game{padding:12px}
  .title-screen h1{font-size:2em}
  .scene-card{padding:20px 16px}
  .item-grid{grid-template-columns:1fr 1fr;gap:8px}
  .suspect-grid{grid-template-columns:1fr}
  .prof-card{width:130px;height:180px}
}
</style>
</head>
<body>
<div class="rain"></div>
<div id="sceneBg"></div>

<div id="game"></div>

<div class="evidence-toggle" id="evToggle" style="display:none">
  证据手册 <span class="count" id="evCount">0</span>
</div>
<div class="evidence-panel" id="evPanel">
  <h3>证据手册</h3>
  <div id="evList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== GAME DATA ==========

const IMAGES = {
  cover: 'images/cover.jpg',
  crime: 'images/crime-scene.jpg',
  corridor: 'images/corridor.jpg',
  dining: 'images/dining-room.jpg',
  secret: 'images/secret-room.jpg',
  confront: 'images/confrontation.jpg',
  dawn: 'images/dawn.jpg'
};

const PROFESSIONS = [

const ITEMS = [

  {id:'zhiyuan',name:'方志远',role:'合伙人',icon:'👔',color:'#4a6b9e',

  {id:'mingxuan',name:'张明轩',role:'学徒',icon:'🧑',color:'#4a8e6b',

  {id:'huizhen',name:'孙慧珍',role:'私人医生',icon:'🩺',color:'#4a8e8e',
   desc:'45岁，家庭医生，被陈伯远发现医疗事故'}
];

// The truth: 5 actual killers + 1 attempted on corpse
const KILLERS = {
  zhiyuan: {method:'在晚宴红酒中下乌头碱',time:'晚8:30',evidence:'ev_aconitine'},
  huizhen: {method:'假借医疗注射过量胰岛素',time:'晚9:00',evidence:'ev_insulin'},
  yuqing: {method:'在降压药中掺入氯化钾',time:'晚9:30',evidence:'ev_potassium'},
  dechang: {method:'用裁纸刀刺了三刀（人已昏迷）',time:'晚10:00',evidence:'ev_stab'},
  mingxuan: {method:'长期投慢性毒药（三周以上）',time:'持续',evidence:'ev_chronic'},

};

const EVIDENCE = {
  ev_wine_residue:{title:'碎酒杯残留',detail:'红酒杯碎片上检测到苦味物质，疑似乌头碱'},
  ev_blood_trail:{title:'血迹拖痕',detail:'从书桌到门口有拖拽血迹，死后被移动过'},

  ev_stab_details:{title:'三处刀伤',detail:'腹部三处刺伤，角度各不相同，来自不同方向'},
  ev_neck_marks:{title:'颈部淤青',detail:'颈部有长条形淤痕，边缘有织物纹理压痕'},
  ev_injection_marks:{title:'手臂针孔',detail:'左臂内侧两个针孔，位置和角度不同'},
  ev_aconitine:{title:'乌头碱中毒',detail:'胃内容物检出乌头碱——一种剧烈心脏毒素'},

  ev_gambling_debt:{title:'赌债借条',detail:'陈雨晴欠下赌场280万，三天内必须偿还'},

// ========== SCENE GRAPH ==========

const SCENES = {

title:{
  bg:IMAGES.cover,
  render(){
    return `<div class="title-screen">
      <h1>雨夜山庄</h1>
      <div class="subtitle">三 刀 两 毒</div>
      <div class="desc">暴风雨之夜，深山中的听雨山庄。<br>
      古董商陈伯远被发现死于书房，表面是心脏病发作。<br>

${missedNames?`你没有发现：${missedNames}。`:''}

${wrong.length?`你冤枉了：${wrong.map(s=>SUSPECTS.find(x=>x.id===s).name).join('、')}。`:''}

这一夜的真相远比你想象的复杂。六个人分别下了杀手，而你只看到了其中一部分。

        text:`你没能指认出任何一个凶手。

暴风雨过后，警方以心脏病发作结案。六个人各自带着秘密离开了听雨山庄。

方志远继续侵吞公司财产。
孙慧珍的执照保住了。
陈雨晴还清了赌债。
李德昌在怨恨中老去。
赵婉容继承了全部遗产。
张明轩……他消失了。

真相被埋在了暴雨之下。没有人是干净的，也没有人受到惩罚。

也许换一种调查方式，你能揭开更多。`,
        correctCount:0,totalKillers
      };
    }
    return{
      title:'冤假错案',
      color:'var(--danger)',
      text:`你的指认有误。

你指认了：${selected.map(s=>SUSPECTS.find(x=>x.id===s).name).join('、')}。

但真正的凶手是：方志远、孙慧珍、陈雨晴、李德昌、赵婉容、张明轩。

你冤枉了无辜的人，让真正的凶手逍遥法外。

暴风雨过后，山庄恢复了平静。但正义，从未到来。`,
      correctCount:correct.length,totalKillers
    };
  }
};

// ========== ENGINE ==========

let currentScene='title';

function startGame(){
  currentScene='profession_draw';
  render();
}

function flipCard(){
  const card=document.getElementById('profCard');
  if(card.classList.contains('flipped'))return;
  const prof=PROFESSIONS[Math.floor(Math.random()*PROFESSIONS.length)];
  st.prof=prof.id;
  document.getElementById('profBack').innerHTML=`
    <div class="prof-icon">${prof.icon}</div>
    <div class="prof-name">${prof.name}</div>
    <div class="prof-skill">${prof.skill}</div>`;
  card.classList.add('flipped');
  setTimeout(()=>{
    document.getElementById('profConfirm').style.display='block';
  },600);
}

function confirmProfession(){
  currentScene='item_select';
  render();
}

let selectedItem=null;
function selectItem(id){
  selectedItem=id;
  document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('item-'+id).classList.add('selected');
  const btn=document.getElementById('itemConfirm');
  btn.disabled=false;
  btn.style.opacity='1';
  btn.style.cursor='pointer';
}

function confirmItem(){
  if(!selectedItem)return;
  st.item=selectedItem;
  currentScene='act1_intro';
  render();
  document.getElementById('evToggle').style.display='block';
}

function go(sceneId){
  currentScene=sceneId;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const scene=SCENES[currentScene];
  if(!scene){console.error('Scene not found:',currentScene);return}

  // Update background
  if(scene.bg){
    document.getElementById('sceneBg').style.backgroundImage=`url('${scene.bg}')`;
  }

  // Run onEnter
  if(scene.onEnter){
    const before=st.evCount();
    scene.onEnter();
  }

  // Render content
  const game=document.getElementById('game');
  game.innerHTML=scene.render();
  game.classList.add('anim-fade');
  setTimeout(()=>game.classList.remove('anim-fade'),800);

  updateEvPanel();
}

// Accusation helpers
function selectCount(n){
  st.accuseCount=n;
  document.querySelectorAll('#countBtns .count-btn').forEach((b,i)=>{
    b.classList.toggle('selected',i+1===n);
  });
  checkAccuseReady();
}

function toggleSuspect(id){
  if(st.accuseSuspects.has(id))st.accuseSuspects.delete(id);
  else st.accuseSuspects.add(id);
  document.getElementById('sus-'+id).classList.toggle('selected');
  checkAccuseReady();
}

function selectCause(c){
  st.accuseCause=c;
  document.querySelectorAll('#causeBtns .count-btn').forEach(b=>{
    b.classList.toggle('selected',b.onclick.toString().includes(c));
  });
  // Simpler: just toggle by onclick match
  const btns=document.querySelectorAll('#causeBtns .count-btn');
  const causes=['heart','poison','stab','suffocate'];
  causes.forEach((c,i)=>btns[i].classList.toggle('selected',c===st.accuseCause));
  checkAccuseReady();
}

function checkAccuseReady(){
  const ready=st.accuseCount!==null&&st.accuseSuspects.size>0&&st.accuseCause!==null;
  const btn=document.getElementById('accuseBtn');
  if(btn){
    btn.disabled=!ready;
    btn.style.opacity=ready?'1':'.4';
    btn.style.cursor=ready?'pointer':'not-allowed';
  }
}

function submitAccusation(){
  if(st.accuseCount===null||st.accuseSuspects.size===0||st.accuseCause===null)return;
  currentScene='ending';
  render();
}

// Evidence panel
function updateEvPanel(){
  const list=document.getElementById('evList');
  const count=document.getElementById('evCount');
  if(count)count.textContent=st.ev.size;

  if(st.ev.size===0){
    list.innerHTML='<div class="ev-empty">尚未收集任何证据</div>';
    return;
  }

  list.innerHTML=[...st.ev].map(id=>{
    const ev=EVIDENCE[id];
    if(!ev)return'';
    return `<div class="ev-item">
      <div class="ev-title">🔍 ${ev.title}</div>
      <div class="ev-detail">${ev.detail}</div>
    </div>`;
  }).join('');
}

// Toast
let toastTimer=null;
function showToast(msg){
  const toast=document.getElementById('toast');
  toast.innerHTML=`<span class="toast-icon">✓</span>${msg}`;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}

// Evidence panel toggle
document.getElementById('evToggle').addEventListener('click',()=>{
  document.getElementById('evPanel').classList.toggle('open');
});

// Close evidence panel when clicking outside
document.addEventListener('click',(e)=>{
  if(!e.target.closest('#evPanel')&&!e.target.closest('#evToggle')){
    document.getElementById('evPanel').classList.remove('open');
  }
});

// Init
render();
</script>
</body>
</html>
